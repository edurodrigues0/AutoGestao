version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: mongo-autogestao
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongo_data:/data/db
    networks:
      - autogestao-net

volumes:
  mongo_data:

networks:
  autogestao-net: